<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おみくじアプリ</title>
  <style>
    :root {
      --red: #b60018;
      --gold: #caa24a;
      --white: #fffdf6;
      --ink: #2b1f16;
      --paper: #f7f0dd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(202, 162, 74, 0.22), transparent 38%),
        radial-gradient(circle at 85% 80%, rgba(182, 0, 24, 0.18), transparent 40%),
        linear-gradient(160deg, #fffaf0 0%, #f4e6c3 100%);
      color: var(--ink);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif;
      padding: 20px;
    }

    .card {
      width: min(92vw, 480px);
      background: var(--white);
      border: 3px solid var(--gold);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(43, 31, 22, 0.2);
      padding: 30px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      border: 2px solid rgba(182, 0, 24, 0.25);
      border-radius: 50%;
      pointer-events: none;
    }

    .card::before { top: -60px; left: -40px; }
    .card::after { bottom: -65px; right: -45px; }

    h1 {
      margin: 0 0 18px;
      color: var(--red);
      letter-spacing: 0.1em;
      font-size: clamp(1.6rem, 4vw, 2rem);
    }

    p.sub {
      margin: 0 0 22px;
      color: #5b4030;
      font-size: 0.95rem;
    }

    button {
      border: none;
      background: linear-gradient(160deg, #d41b30 0%, #9d0016 100%);
      color: #fff;
      padding: 12px 24px;
      font-size: 1rem;
      letter-spacing: 0.08em;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(157, 0, 22, 0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(157, 0, 22, 0.38);
    }

    button:active { transform: translateY(0); }

    .result {
      margin-top: 24px;
      min-height: 120px;
      background: var(--paper);
      border: 2px solid rgba(202, 162, 74, 0.75);
      border-radius: 12px;
      padding: 18px 14px;
      display: grid;
      align-content: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .result.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: reveal 0.55s ease;
    }

    .fortune {
      margin: 0;
      font-size: clamp(1.5rem, 6vw, 2rem);
      color: var(--red);
      font-weight: 700;
    }

    .message {
      margin: 0;
      line-height: 1.6;
      font-size: 0.98rem;
      color: #3f2d20;
    }

    @keyframes reveal {
      0% { opacity: 0; transform: translateY(12px) scale(0.95); }
      60% { opacity: 1; transform: translateY(-2px) scale(1.03); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>おみくじ</h1>
    <p class="sub">心を整えて、今日の運勢を引いてみましょう。</p>
    <button id="drawButton" type="button">おみくじを引く</button>

    <section id="resultArea" class="result" aria-live="polite">
      <p class="fortune">---</p>
      <p class="message">ボタンを押して運勢を表示します。</p>
    </section>
  </main>

  <script>
    const fortunes = [
      { name: "大吉", message: "最高の追い風。迷ったら前進して吉。" },
      { name: "中吉", message: "安定した運気。丁寧な積み重ねが実を結びます。" },
      { name: "小吉", message: "小さな幸運あり。身近な人への感謝が鍵です。" },
      { name: "吉", message: "穏やかな一日。焦らず自分のペースで進みましょう。" },
      { name: "末吉", message: "後半に運気上昇。今は準備を整えると良い流れに。" },
      { name: "凶", message: "慎重さが必要な日。無理せず休息を大切に。" },
      { name: "大凶", message: "試練の日。深呼吸して一歩ずつ、必ず道は開けます。" }
    ];

    const drawButton = document.getElementById("drawButton");
    const resultArea = document.getElementById("resultArea");
    const fortuneEl = resultArea.querySelector(".fortune");
    const messageEl = resultArea.querySelector(".message");

    drawButton.addEventListener("click", () => {
      const random = Math.floor(Math.random() * fortunes.length);
      const picked = fortunes[random];

      resultArea.classList.remove("show");
      void resultArea.offsetWidth;

      fortuneEl.textContent = picked.name;
      messageEl.textContent = picked.message;
      resultArea.classList.add("show");
    });
  </script>
</body>
</html>
